schema_version: "1.0"
repository: trust-infrastructure-schemas
portfolio_tier: flagship
lifecycle: active
role: portable-machine-readable-contract-layer
stability: provisional
current_version: "v0.11.0"
authority:
  owns:
    - trust-artifact-schemas
    - schema-identifiers
    - portable-evidence-contracts
    - schema-validation-rules
  does_not_own:
    - canonical-semantic-definitions
    - domain-specific-governance-conclusions
    - external-certification
dependencies:
  - repository: trust-systems-meta-model
    relationship: derives-semantics-from
    role: canonical-semantic-model
  - repository: trust-graph-artifacts
    relationship: supplies-contracts-to
    role: implementation-layer
version_policy:
  compatibility: additive changes preserve declared contracts unless migration guidance states otherwise
  unverified_later_versions: require explicit review before compatibility is claimed
supersession_policy: newer authoritative artifacts supersede earlier artifacts only when explicitly declared
revocation_or_withdrawal_policy: unsafe or misleading artifacts may be withdrawn by maintainers with an auditable rationale
