name: Build and deploy GitHub Pages
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - uses: actions/configure-pages@v5
      - name: Build site
        run: bundle exec jekyll build --trace
      - name: Verify generated site
        shell: bash
        run: |
          set -euo pipefail
          test -f _site/index.html || {
            echo "::error::Jekyll did not generate _site/index.html. Ensure a root index.md with front matter and permalink exists."
            exit 1
          }
          grep -R --include='*.html' -q "mermaid-init.js" _site || {
            echo "::error::The generated site does not include the Mermaid initialization module."
            exit 1
          }
          grep -R --include='*.html' -q "Trust Infrastructure Schemas" _site/index.html || {
            echo "::error::The generated home page does not contain the expected repository title."
            exit 1
          }
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
